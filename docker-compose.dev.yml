version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: datart-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: datart123456
      MYSQL_DATABASE: datart
    volumes:
      - mysql_data:/var/lib/mysql
    command: --lower_case_table_names=1 --skip-character-set-client-handshake

  redis:
    image: redis:latest
    container_name: datart-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    image: maven:3.8-openjdk-11
    container_name: datart-backend
    working_dir: /app
    depends_on:
      - mysql
      - redis
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
    volumes:
      - .:/app
    command: >
      sh -c "
        cd /app &&
        mvn clean install -DskipTests -Dskip.npm -Dskip.installnodenpm &&
        cd /app/server &&
        mvn spring-boot:run -Dspring-boot.run.profiles=dev -Dspring-boot.run.jvmArguments='-Dspring.datasource.url=jdbc:mysql://mysql:3306/datart?useSSL=false&serverTimezone=Asia/Shanghai -Dspring.redis.host=redis'
      "

  frontend:
    image: node:16
    container_name: datart-frontend
    working_dir: /app/frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - REACT_APP_API_BASE_URL=http://localhost:8080
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app/frontend
    command: >
      sh -c "
        cd /app/frontend &&
        npm install chokidar@3 --save-dev --legacy-peer-deps &&
        npm start
      "

volumes:
  mysql_data:
  redis_data:
