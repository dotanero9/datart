server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/datart?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&verifyServerCertificate=false&useSSL=false
    username: root
    password: datart123456
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 5
      maximum-pool-size: 15
      auto-commit: true
      idle-timeout: 30000
      pool-name: DatebookHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.MySQL5InnoDBDialect
    database: mysql

  redis:
    host: localhost
    port: 6379
    password:
    jedis:
      pool:
        max-active: 20
        max-wait: -1
        max-idle: 10
        min-idle: 0
    timeout: 5000ms

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

datart:
  security:
    jwt:
      secret: datart-secret
      access-token-validity: 43200
  cors:
    allowed-origins:
      - "*"
    allowed-methods:
      - "*"
    allowed-headers:
      - "*"
  file:
    upload-path: ./files
  cache:
    enable: true
  scheduler:
    enable: true
  datasource:
    provider: datart.datasource.provider.JdbcDataSourceProvider