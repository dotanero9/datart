# Enterprise Edition CI/CD Pipeline
# Builds and tests both frontend and backend components

name: Enterprise CI

on:
  push:
    branches: [ "master", "feat/enterprise-edition" ]
  pull_request:
    branches: [ "master", "feat/enterprise-edition" ]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B package --file pom.xml
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: datart-server
        path: server/target/*.jar

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'
    - name: Install dependencies
      run: npm ci
      working-directory: ./frontend
    - name: Build
      run: npm run build --if-present
      working-directory: ./frontend
    - name: Lint
      run: npm run lint:css && npm run lint:style
      working-directory: ./frontend

  docker-build:
    needs: [backend-build, frontend-build]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: datart:enterprise-latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
